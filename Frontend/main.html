<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>Quiz App</title>
    <link rel="stylesheet" href="main.css">
</head>

<body>
    <div class="header">
        <h2>
            Web Quiz
        </h2>
    </div>
    <div class="main">
        <div class="alert-wrapper">
            <div class="alert-list">
                <div class="correct-alert alert">
                    Correct!
                </div>
                <div class="incorrect-alert alert">
                    Incorrect!
                </div>
                <div class="done-alert alert">
                    Results: 80% 8/10
                </div>
            </div>
        </div>
        <div class="card-wrapper">
            <div class="card">
                <div class="card-header">
                    <h3>
                        Question #1
                    </h3>
                </div>
                <div class="card-content">
                    <p>
                        What is 2 + 2?
                    </p>
                </div>
                <div class="card-actions">
                    <button class="answer-button">
                        A) 1
                    </button>
                    <button class="answer-button incorrect-button">
                        B) 2
                    </button>
                    <button class="answer-button">
                        C) 3
                    </button>
                    <button class="answer-button correct-button">
                        D) 4
                    </button>
                </div>
            </div>
        </div>
        <div class="page-actions">
            <button class="start-over-button">
                Start Over
            </button>
        </div>
    </div>
</body>

</html>
